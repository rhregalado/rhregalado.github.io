{% include base_path %}

<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
    <h4 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h4>
  {% endif %}

  <a href="https://twitter.com/intent/tweet?text={{ base_path }}{{ page.url }}" class="btn btn--twitter" title="{{ site.data.ui-text[site.locale].tweet_on_label | default: 'Tweet on' }} Twitter"><i class="fab fa-twitter" aria-hidden="true"></i><span> Twitter</span></a>

  <a href="https://www.facebook.com/sharer/sharer.php?u={{ base_path }}{{ page.url }}" class="btn btn--facebook" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Facebook"><i class="fab fa-facebook" aria-hidden="true"></i><span> Facebook</span></a>

  <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ base_path }}{{ page.url }}" class="btn btn--linkedin" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} LinkedIn"><i class="fab fa-linkedin" aria-hidden="true"></i><span> LinkedIn</span></a>

  <a href="mailto:?" class="btn btn--envelope" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" data-placement="top" title="Share by Email" class="hover-effect-big"><i class="fa fa-envelope fa-fw" aria-hidden="true"></i><span> Email</span></a>

<html>
<body>
    <a class="btn btn--link" onclick="copyURI(event)" class="copy-link" data-toggle="tooltip" data-placement="top" title="Copy Link" class="hover-effect-big"><i class="fa fa-link fa-fw" aria-hidden="true"></i><span> Copy Link</span></a>

    <script>
  const copyUrlToClipboard = (inputHTMLElement) => {
  // the actual, to be copied url
  const copyUrl = window.location.href

  // the pretty url to display (without schema)
  // this should be the default value of the input on instantiation
  const displayUrl = window.location.host + window.location.pathname

  // just prior to copying, temporarily change the input value to the
  // to be copied url
  inputHTMLElement.value = copyUrl

  // select the input value
  inputHTMLElement.select()

  // Required for iOS
  // See also https://stackoverflow.com/a/54966926/45974
  inputHTMLElement.setSelectionRange(0, inputHTMLElement.value.length)

  // Copy input value
  try {
    if (!document.execCommand('copy')) {
      throw new Error(`failed to execute copy command`)
    }
  }
  catch (e) {
    console.log('Warning! Could not copy to clipboard.', e)
  }

  // Restore the pretty display url
  inputHTMLElement.value = displayUrl

  // Deselect the input
  inputHTMLElement.focus()
  inputHTMLElement.setSelectionRange(0, 0)
}           
    </script>
</body>
</html>

</section>

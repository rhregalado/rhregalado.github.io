{% include base_path %}

<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
    <h4 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h4>
  {% endif %}

  <a href="https://twitter.com/intent/tweet?text={{ base_path }}{{ page.url }}" class="btn btn--twitter" title="{{ site.data.ui-text[site.locale].tweet_on_label | default: 'Tweet on' }} Twitter"><i class="fab fa-twitter" aria-hidden="true"></i><span> Twitter</span></a>

  <a href="https://www.facebook.com/sharer/sharer.php?u={{ base_path }}{{ page.url }}" class="btn btn--facebook" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Facebook"><i class="fab fa-facebook" aria-hidden="true"></i><span> Facebook</span></a>

  <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ base_path }}{{ page.url }}" class="btn btn--linkedin" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} LinkedIn"><i class="fab fa-linkedin" aria-hidden="true"></i><span> LinkedIn</span></a>

  <a href="mailto:?" class="btn btn--envelope" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" data-placement="top" title="Share by Email" class="hover-effect-big"> <i class="fa fa-envelope fa-fw" aria-hidden="true"></i><span></span></a>

 <html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/link.css">
    <title>Text Copy To Clipboard In One Click</title>
</head>
<body>
    <div class="hero">
    <div class="container">
       <input id="copy-text" type="text" placeholder="Write Some Text"/> 
       <button onclick="copy('copy-text')" class="btn" type="submit">Copy Text</button>
    </div>
    <div class="container">
        <textarea name="test" id="test" placeholder="For Testing"></textarea>
     </div>
     <div class="popup" id="popup">
        <ion-icon class="icon" name="checkmark-outline"></ion-icon>
        <h2>Copied!</h2>
        <button class="ok_btn" type="button" onclick="closePopup()">OK</button>
     </div>
    </div>
   <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
   <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script> 
   <script src="/assets/js/link.js"></script> 
</body>   
</html>

</section>
